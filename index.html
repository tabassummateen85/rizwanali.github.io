<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rizwan Ali Jeans | Ultra Edition</title>

<style>
:root{
  --bg:#f4f4f4;
  --card:#ffffff;
  --text:#111;
  --nav:#000;
  --border:#ddd;
  --shadow:rgba(0,0,0,0.1);
}

body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
.navbar{
  background:var(--nav);
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
  background:#111;
  color:white;
}

.hero h1{
  margin:0;
  font-size:38px;
}

.hero p{
  margin-top:10px;
  color:#ccc;
}

/* SEARCH */
.search-box{
  padding:20px;
  text-align:center;
}

.search-box input{
  width:80%;
  max-width:400px;
  padding:12px;
  border-radius:25px;
  border:1px solid var(--border);
  font-size:16px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px var(--shadow);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:320px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card h3{
  margin:0;
}

.price{
  color:#25D366;
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

.btn{
  display:block;
  text-align:center;
  background:#25D366;
  color:white;
  text-decoration:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:white;
  margin-top:30px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Rizwan Ali Jeans</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Ultra Edition</h1>
  <p>Premium Fashion Jeans Collection</p>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" placeholder="Search Jeans...">
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">
    <img src="IMG-20260418-WA0001.jpg" alt="Jeans">
    <div class="card-content">
      <h3>Premium Blue Jeans</h3>
      <div class="price">€45</div>
      <a class="btn" href="https://wa.me/34602097864">
        Order on WhatsApp
      </a>
    </div>
  </div>

  <div class="card">
    <img src="IMG-20260418-WA0002.jpg" alt="Jeans">
    <div class="card-content">
      <h3>Ultra Black Jeans</h3>
      <div class="price">€50</div>
      <a class="btn" href="https://wa.me/34602097864">
        Order on WhatsApp
      </a>
    </div>
  </div>

  <div class="card">
    <img src="IMG-20260418-WA0003.jpg" alt="Jeans">
    <div class="card-content">
      <h3>Classic Fit Jeans</h3>
      <div class="price">€40</div>
      <a class="btn" href="https://wa.me/34602097864">
        Order on WhatsApp
      </a>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Rizwan Ali Jeans | All Rights Reserved
</div>

</body>
</html>
