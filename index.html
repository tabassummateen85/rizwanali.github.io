     <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rizwan Ali Jeans | Official Store</title>
  <style>
    :root {
      --primary: #000;
      --accent: #25D366; /* WhatsApp Green */
      --gray: #888;
      --light-bg: #f9f9f9;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #111;
      overflow-x: hidden;
    }

    /* NAVIGATION */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background: var(--primary);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo { font-size: 1.4rem; font-weight: bold; letter-spacing: 2px; }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .cart-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      position: relative;
    }

    #cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      background: var(--accent);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    /* HERO SECTION (#home) */
    .hero {
      height: 60vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                  url('IMG-20260418-WA0001.jpg') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h1 { font-size: 3rem; margin: 0; }
    .hero p { font-size: 1.2rem; margin-top: 10px; }

    /* FILTERS */
    .filter-bar {
      padding: 30px 5% 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .filter-btn {
      padding: 8px 20px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      border-radius: 20px;
      transition: 0.3s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* PRODUCT GRID (#products) */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      padding: 20px 5% 60px;
    }

    .product-card {
      background: white;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
    }

    .product-card img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      background: #f4f4f4;
    }

    .product-info { padding: 15px 0; }
    .product-info h3 { margin: 0; font-size: 1.1rem; }
    .product-color { color: var(--gray); font-size: 0.9rem; margin: 5px 0; }
    .product-price { font-weight: bold; margin-bottom: 10px; display: block; }

    .size-select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
    }

    .add-to-cart-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    /* CART SIDEBAR (#cart) */
    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -100%;
      width: 350px;
      height: 100%;
      background: white;
      box-shadow: -5px 0 15px rgba(0,0,0,0.1);
      z-index: 2000;
      transition: 0.4s ease;
      padding: 25px;
      display: flex;
      flex-direction: column;
    }

    .cart-sidebar.open { right: 0; }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding-bottom: 15px;
    }

    #cart-items-list {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px 0;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f9f9f9;
    }

    .whatsapp-checkout {
      background: var(--accent);
      color: white;
      text-align: center;
      padding: 15px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 4px;
      display: block;
    }

    footer {
      background: #000;
      color: #666;
      text-align: center;
      padding: 40px;
    }

    @media (max-width: 500px) {
      .cart-sidebar { width: 100%; }
      .hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">RIZWAN ALI</div>
    <nav class="nav-links">
      <a href="#home">Home</a>
      <a href="#products">Shop</a>
      <button class="cart-btn" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
      </button>
    </nav>
  </header>

  <section id="home" class="hero">
    <h1>Premium Denim</h1>
    <p>Modern Fit. Professional Style.</p>
  </section>

  <section id="products">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterItems('All')">All</button>
      <button class="filter-btn" onclick="filterItems('Light Blue')">Light Blue</button>
      <button class="filter-btn" onclick="filterItems('Dark Blue')">Dark Blue</button>
      <button class="filter-btn" onclick="filterItems('Black')">Black</button>
    </div>

    <div class="products-grid" id="grid">
      </div>
  </section>

  <div id="cart" class="cart-sidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button onclick="toggleCart()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div id="cart-items-list">
      <p>Cart is empty</p>
    </div>
    <div id="cart-footer" style="display:none;">
      <a href="javascript:void(0)" class="whatsapp-checkout" onclick="checkout()">
        Order on WhatsApp
      </a>
    </div>
  </div>

  <footer>
    <p>© 2026 Rizwan Ali Jeans | Spain: +34 602 09 78 64</p>
  </footer>

  <script>
    // 1. PRODUCT DATABASE (with Color included)
    const productData = [
      { id: 1, name: "Premium Slim Fit", color: "Light Blue", price: "45€", img: "IMG-20260418-WA0001.jpg" },
      { id: 2, name: "Modern Tapered", color: "Dark Blue", price: "45€", img: "IMG-20260418-WA0002.jpg" },
      { id: 3, name: "Street Classic", color: "Black", price: "50€", img: "IMG-20260418-WA0003.jpg" }
    ];

    let cart = JSON.parse(localStorage.getItem('denimCart')) || [];

    // 2. RENDER PRODUCTS
    function displayProducts(category = 'All') {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      const filtered = category === 'All' ? productData : productData.filter(p => p.color === category);

      filtered.forEach(p => {
        grid.innerHTML += `
          <div class="product-card">
            <img src="${p.img}" alt="${p.name}">
            <div class="product-info">
              <h3>${p.name}</h3>
              <p class="product-color">${p.color}</p>
              <span class="product-price">${p.price}</span>
              <select class="size-select" id="size-${p.id}">
                <option value="">Select Size</option>
                <option value="32">32</option>
                <option value="34">34</option>
                <option value="36">36</option>
              </select>
              <button class="add-to-cart-btn" onclick="addToCart(${p.id})">ADD TO CART</button>
            </div>
          </div>
        `;
      });
    }

    // 3. CART FUNCTIONS
    function addToCart(productId) {
      const sizeSelector = document.getElementById(`size-${productId}`);
      const selectedSize = sizeSelector.value;

      if (!selectedSize) {
        alert("Please select a size first!");
        return;
      }

      const product = productData.find(p => p.id === productId);
      cart.push({ ...product, size: selectedSize });
      
      saveCart();
      renderCart();
      toggleCart(true);
    }

    function renderCart() {
      const list = document.getElementById('cart-items-list');
      const footer = document.getElementById('cart-footer');
      const countLabel = document.getElementById('cart-count');

      countLabel.innerText = cart.length;

      if (cart.length === 0) {
        list.innerHTML = '<p>Cart is empty</p>';
        footer.style.display = 'none';
      } else {
        footer.style.display = 'block';
        list.innerHTML = cart.map((item, index) => `
          <div class="cart-item">
            <div>
              <strong>${item.name}</strong><br>
              <small>Size: ${item.size} | ${item.color}</small>
            </div>
            <button onclick="remove(${index})" style="color:red; border:none; background:none; cursor:pointer;">Remove</button>
          </div>
        `).join('');
      }
    }

    function remove(index) {
      cart.splice(index, 1);
      saveCart();
      renderCart();
    }

    function saveCart() {
      localStorage.setItem('denimCart', JSON.stringify(cart));
    }

    function toggleCart(forceOpen = false) {
      const sidebar = document.getElementById('cart');
      if (forceOpen) sidebar.classList.add('open');
      else sidebar.classList.toggle('open');
    }

    function filterItems(color) {
      displayProducts(color);
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText === color);
      });
    }

    // 4. WHATSAPP CHECKOUT
    function checkout() {
      const phone = "34602097864";
      let text = "Hello Rizwan Ali Jeans! I want to order:%0A%0A";
      
      cart.forEach((item, i) => {
        text += `${i+1}. *${item.name}* - Color: ${item.color} - Size: ${item.size}%0A`;
      });

      window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }

    // Initial Load
    displayProducts();
    renderCart();

  </script>
</body>
</html>
